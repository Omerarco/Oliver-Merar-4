index.html <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universal Web Hub</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    overflow:hidden;
}

.topbar{
    width:100%;
    height:70px;
    background:#1a1a1a;
    display:flex;
    align-items:center;
    padding:0 15px;
    box-sizing:border-box;
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
    margin-right:20px;
}

input{
    flex:1;
    height:45px;
    border:none;
    border-radius:12px;
    padding:0 15px;
    font-size:18px;
    outline:none;
}

button{
    margin-left:10px;
    height:45px;
    padding:0 20px;
    border:none;
    border-radius:12px;
    background:#3b82f6;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.quicklinks{
    width:100%;
    height:55px;
    background:#181818;
    display:flex;
    align-items:center;
    padding-left:10px;
    box-sizing:border-box;
    overflow-x:auto;
}

.quicklinks button{
    background:#2a2a2a;
    margin-right:10px;
    white-space:nowrap;
}

iframe{
    width:100%;
    height:calc(100vh - 125px);
    border:none;
    background:white;
}

</style>
</head>

<body>

<div class="topbar">

<div class="logo">Web Hub</div>

<input
id="urlBox"
placeholder="Enter website or search..."
>

<button onclick="go()">Go</button>

</div>

<div class="quicklinks">

<button onclick="openSite('https://google.com')">Google</button>

<button onclick="openSite('https://youtube.com')">YouTube</button>

<button onclick="openSite('https://wikipedia.org')">Wikipedia</button>

<button onclick="openSite('https://github.com')">GitHub</button>

<button onclick="openSite('https://chatgpt.com')">ChatGPT</button>

</div>

<iframe id="viewer" src="https://example.com"></iframe>

<script>

function go(){

let value=document.getElementById("urlBox").value.trim();

if(
value.startsWith("http://") ||
value.startsWith("https://")
){
    openSite(value);
}
else if(value.includes(".")){
    openSite("https://" + value);
}
else{
    openSite(
      "https://www.google.com/search?q=" +
      encodeURIComponent(value)
    );
}

}

function openSite(url){
    document.getElementById("viewer").src=url;
}

</script>

</body>
</html>
